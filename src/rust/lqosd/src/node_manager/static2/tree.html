<div class="row g-4 align-items-start">
    <div class="col-lg-4">
        <h5><i class="fa fa-tree"></i> Network Tree (<span id="nodeName" class="redactable"></span><span id="nodeNameIcons" class="ms-1"></span>)</h5>
        <div id="treeBreadcrumb"></div>
        <div id="treeHeaderSummary" class="small text-body-secondary mt-2"></div>
        <div class="lqos-table-wrap">
            <table class="lqos-table lqos-table-compact">
                <thead>
                    <th></th>
                    <th>Download</th>
                    <th>Upload</th>
                </thead>
                <tbody>
                    <tr class="small">
                        <td class="table-label-cell">Effective Limit</td>
                        <td class="small"><span id="parentEffectiveD"></span></td>
                        <td class="small"><span id="parentEffectiveU"></span></td>
                    </tr>
                    <tr class="small">
                        <td class="table-label-cell">Configured Limit</td>
                        <td class="small"><span id="parentConfiguredD"></span></td>
                        <td class="small"><span id="parentConfiguredU"></span></td>
                    </tr>
                    <tr class="small">
                        <td class="table-label-cell">Throughput</td>
                        <td><span id="parentTpD"></span></td>
                        <td><span id="parentTpU"></span></td>
                    </tr>
                    <tr class="small">
                        <td class="table-label-cell">RTT</td>
                        <td><span id="parentRttD"></span></td>
                        <td><span id="parentRttU"></span></td>
                    </tr>
                    <tr class="small">
                        <td class="table-label-cell">QoO</td>
                        <td><span id="parentQooD"></span></td>
                        <td><span id="parentQooU"></span></td>
                    </tr>
                    <tr class="small">
                        <td class="table-label-cell">TCP Retransmits</td>
                        <td><span id="parentRxmitD"></span></td>
                        <td><span id="parentRxmitU"></span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="col-lg-8">
        <div class="lqos-tree-settings-card">
            <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
                <h5 class="mb-0"><i class="fa fa-sliders"></i> Node Settings</h5>
                <div id="nodeOverrideStatus" class="small text-body-secondary"></div>
            </div>
            <div id="nodeOverrideFlash"></div>
            <div id="nodeOverrideLegacyWarnings"></div>
            <div id="nodeOverrideDisabledReason"></div>
            <dl class="row small lqos-tree-settings-grid mb-4">
                <dt class="col-sm-4">Node Type</dt>
                <dd class="col-sm-8" id="nodeSettingsType">-</dd>

                <dt class="col-sm-4">Stable Node ID</dt>
                <dd class="col-sm-8 font-monospace" id="nodeSettingsNodeId">-</dd>

                <dt class="col-sm-4">Base Source</dt>
                <dd class="col-sm-8" id="nodeSettingsBaseSource">Integration/network.json</dd>

                <dt class="col-sm-4">Override Source</dt>
                <dd class="col-sm-8" id="nodeSettingsOverrideSource">Operator</dd>

                <dt class="col-sm-4">Base Configured Rate</dt>
                <dd class="col-sm-8" id="nodeSettingsBaseConfigured">-</dd>

                <dt class="col-sm-4">Operator Override</dt>
                <dd class="col-sm-8" id="nodeSettingsOverride">None</dd>

                <dt class="col-sm-4">Effective Now</dt>
                <dd class="col-sm-8" id="nodeSettingsEffectiveNow">-</dd>
            </dl>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label small text-body-secondary" for="nodeOverrideDownload">Download Mbps</label>
                    <input class="form-control" id="nodeOverrideDownload" type="number" min="0" step="0.01" inputmode="decimal">
                </div>
                <div class="col-md-6">
                    <label class="form-label small text-body-secondary" for="nodeOverrideUpload">Upload Mbps</label>
                    <input class="form-control" id="nodeOverrideUpload" type="number" min="0" step="0.01" inputmode="decimal">
                </div>
            </div>
            <div class="d-flex flex-wrap gap-2 mt-3">
                <button class="btn btn-primary" id="nodeOverrideSave" type="button">
                    <i class="fa fa-save"></i> Save Override
                </button>
                <button class="btn btn-outline-secondary" id="nodeOverrideClear" type="button">
                    <i class="fa fa-eraser"></i> Clear Override
                </button>
            </div>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-12" id="tree">
        <p><i class="fa fa-spin fa-spinner"></i> Loading, Please Wait</p>
    </div>
</div>
<div class="row">
    <div class="col-12" id="clients">
    </div>
</div>

<script src="tree.js%CACHEBUSTERS%"></script>
