<div class="row lqos-circuit-top-row align-items-stretch">
    <div class="col-12 col-lg-3">
        <div class="lqos-circuit-panel">
            <h5><i class="fa fa-user"></i> <span id="circuitName" class="redactable lqos-ellipsis-inline"></span></h5>
            <div class="lqos-table-wrap">
                <table class="lqos-table lqos-table-compact">
                    <tr>
                        <td class="table-label-cell">Parent Node</td>
                        <td class="table-value-cell"><a id="parentNode" class="redactable" href="#"></a></td>
                    </tr>
                    <tr>
                        <td class="table-label-cell">Maximum Speed</td>
                        <td class="table-value-cell"><span id="bwMax"></span></td>
                    </tr>
                    <tr>
                        <td class="table-label-cell">Minimum Speed</td>
                        <td class="table-value-cell"><span id="bwMin"></span></td>
                    </tr>
                    <tr>
                        <td class="table-label-cell">RTT Metrics</td>
                        <td class="table-value-cell">
                            <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox" id="excludeRttToggle">
                            <label class="form-check-label" for="excludeRttToggle">
                                Exclude
                                <span
                                    class="ms-1 text-muted"
                                    role="button"
                                        tabindex="0"
                                        aria-label="Exclude from RTT information"
                                        data-bs-toggle="tooltip"
                                        data-bs-placement="top"
                                        title="Exclude this circuit from RTT heatmaps and QoO RTT scoring. QoO will show as unknown."
                                    ><i class="fas fa-info-circle"></i></span>
                                </label>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" id="captureButton">
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-3">
        <div class="lqos-circuit-panel lqos-circuit-gauge-panel">
            <div class="lqos-circuit-gauge-grid">
                <div id="bitsGauge" style="width: 100%; height: 200px;"></div>
                <div id="qooGauge" style="width: 100%; height: 200px;"></div>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-3">
        <div class="lqos-circuit-panel lqos-circuit-chart-panel">
            <div id="throughputGraph">
                <div class="lqos-loading-block lqos-loading-block-sm">
                    <i class="fa fa-spinner fa-spin"></i>
                    <span>Loading throughput…</span>
                </div>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-3">
        <div class="lqos-circuit-panel lqos-circuit-chart-panel">
            <div id="rxmitGraph">
                <div class="lqos-loading-block lqos-loading-block-sm">
                    <i class="fa fa-spinner fa-spin"></i>
                    <span>Loading retransmits…</span>
                </div>
            </div>
        </div>
    </div>
</div>

<ul class="nav nav-tabs lqos-pill-tabs mb-3" id="myTab" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="devs-tab" data-bs-toggle="tab" data-bs-target="#devs" type="button" role="tab" aria-controls="devs" aria-selected="true">
            <i class="fa fa-server"></i> Devices
        </button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="sankey-tab" data-bs-toggle="tab" data-bs-target="#sankey" type="button" role="tab" aria-controls="profile" aria-selected="false">
            <i class="fa fa-map"></i> Flow Sankey <span id="activeFlowCount" class="badge">0</span>
        </button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="traffic-tab" data-bs-toggle="tab" data-bs-target="#traffic" type="button" role="tab" aria-controls="contact" aria-selected="false">
            <i class="fa fa-table"></i> Traffic Flows <span id="trafficFlowCount" class="badge">0</span>
        </button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="funnel-tab" data-bs-toggle="tab" data-bs-target="#funnel" type="button" role="tab" aria-controls="contact" aria-selected="false">
            <i class="fa fa-tree"></i> Queue Tree
        </button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="cake-tab" data-bs-toggle="tab" data-bs-target="#cake" type="button" role="tab" aria-controls="contact" aria-selected="false">
            <i class="fa fa-birthday-cake"></i> Queue Stats
        </button>
    </li>
</ul>
<div class="tab-content" id="myTabContent">
    <div class="tab-pane fade show active" id="devs" role="tabpanel" aria-labelledby="devs-tab">
        <div class="row" id="devices">
            <div class="col-12">
                <div class="lqos-loading-block lqos-loading-block-lg">
                    <i class="fa fa-spinner fa-spin"></i>
                    <span>Loading devices…</span>
                </div>
            </div>
        </div>
    </div>
    <div class="tab-pane fade" id="sankey" role="tabpanel" aria-labelledby="sankey-tab">
        <div class="row">
            <div class="col-12">
                <div id="flowSankey" style="height: 600px; width: 1024px"></div>
            </div>
        </div>
    </div>
    <div class="tab-pane fade" id="traffic" role="tabpanel" aria-labelledby="traffic-tab">
        <div class="row">
            <div class="d-inline-flex align-items-center">
                <input type="checkbox" id="hideSmallFlows" class="text-secondary">
                <label for="hideSmallFlows" class="ms-2">Hide Small Flows</label>
            </div>
            <div class="col-12" id="allTraffic">
                <div class="lqos-loading-block lqos-loading-block-lg">
                    <i class="fa fa-spinner fa-spin"></i>
                    <span>Loading traffic…</span>
                </div>
            </div>
        </div>
    </div>
    <div class="tab-pane fade" id="funnel" role="tabpanel" aria-labelledby="funnel-tab">
        <div class="row">
            <div class="col-12" id="theFunnel">
                <div class="lqos-loading-block lqos-loading-block-lg">
                    <i class="fa fa-spinner fa-spin"></i>
                    <span>Loading queue tree…</span>
                </div>
            </div>
        </div>
    </div>
    <div class="tab-pane fade" id="cake" role="tabpanel" aria-labelledby="cake-tab">
        <div class="row">
            <div class="col-4">
                <div id="cakeBacklog" style="height: 250px"></div>
            </div>
            <div class="col-4">
                <div id="cakeDelays" style="height: 250px"></div>
            </div>
            <div class="col-4">
                <div id="cakeQueueLength" style="height: 250px"></div>
            </div>
            <div class="col-4">
                <div id="cakeTraffic" style="height: 250px"></div>
            </div>
            <div class="col-4">
                <div id="cakeMarks" style="height: 250px"></div>
            </div>
            <div class="col-4">
                <div id="cakeDrops" style="height: 250px"></div>
            </div>
            <div class="col-3">
                Queue Memory: <span id="cakeQueueMemory">?</span>
                <div class="text-muted small mt-1">Queue Type: <span id="cakeQueueType">?</span></div>
            </div>
        </div>
    </div>
</div>




<script src="circuit.js%CACHEBUSTERS%"></script>
