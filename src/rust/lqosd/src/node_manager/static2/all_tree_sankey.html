<div class="row align-items-center g-2">
    <div class="col small">

        <label for="maxDepth">Max Depth:</label> <input type="number" min="2" max="10" id="maxDepth">
    </div>
    <div class="col-auto small d-flex align-items-center gap-2 flex-nowrap">
        <button class="btn btn-warning btn-sm" id="btnPause"><i class="fa fa-pause"></i> Pause</button>
        <label for="cadence" class="mb-0">Refresh Rate:</label>
        <input type="number" min="1" max="120" id="cadence" value="1" style="width: 60px">
    </div>
</div>
<div class="row" style="height: 98%;">
    <div class="col-12" style="height: 100%;" id="sankey"></div>
</div>
