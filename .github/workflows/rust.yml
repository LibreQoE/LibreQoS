name: Rust

on: [push]

jobs:
  build:
    runs-on: [ lq_run ]
    
    steps:
    - uses: actions/checkout@v4
    - name: Set Version ENV
      run: echo "VERSION=$(cat src/VERSION_STRING)" >> "$GITHUB_ENV"
    - name: Check env var
      run: |
         echo ${{ env.VERSION }}
    - name: Install dependencies
      run: |
        sudo /bin/apt-get update
        sudo /bin/apt-get install --no-install-recommends \
          python3-pip clang gcc gcc-multilib llvm libelf-dev graphviz esbuild \
          pkg-config libbpf-dev mold unzip linux-tools-common "linux-tools-$(uname -r)" \
        || sudo /bin/apt-get install --no-install-recommends \
          python3-pip clang gcc gcc-multilib llvm libelf-dev graphviz esbuild \
          pkg-config libbpf-dev mold unzip linux-tools-common linux-tools-azure

        KERNEL_FULL="$(uname -r)"
        KERNEL_BASE="${KERNEL_FULL%-*}"

        BPFBIN="$(dpkg -L "linux-tools-$KERNEL_FULL" 2>/dev/null | awk '/\/bpftool$/ { print; exit }')"
        if [ -z "$BPFBIN" ]; then
          BPFBIN="$(find /usr/lib -type f -name bpftool \( -path "*/$KERNEL_FULL/*" -o -path "*/$KERNEL_BASE/*" -o -path "*/linux-tools-$KERNEL_BASE/*" \) | head -n1)"
        fi
        if [ -z "$BPFBIN" ]; then
          echo "Unable to locate installed bpftool binary directory" >&2
          exit 1
        fi

        BPFDIR="$(dirname "$BPFBIN")"
        echo "$BPFDIR" >> "$GITHUB_PATH"
        export PATH="$BPFDIR:$PATH"
        command -v bpftool
        bpftool version
    - name: Build
      run: pushd src/rust; cargo build --verbose --all; popd
    - name: Run tests
      run: pushd src/rust; cargo test --verbose --all; popd
    - name: Build .deb file
      run: ./build_dpkg.sh --nostamp
      working-directory: src/
    - name: Archive .deb file
      uses: actions/upload-artifact@v4
      with:
        name: libreqos_${{ env.VERSION }}.-1_amd64.deb
        path: src/dist/libreqos_${{ env.VERSION }}.-1_amd64.deb
  
  audit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install tools
      run: pushd src/rust; cargo install cargo-audit; popd
    - name: Audit for CVEs
      run: cd src/rust; cargo audit -c always
